<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>打磚塊遊戲</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#050510;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

/* 遊戲外框 */
#gameContainer{
    position:relative;
    border:1px solid #00f5ff;
    box-shadow:0 0 20px #00f5ff;
}

/* 畫布 */
canvas{
    background:linear-gradient(180deg,#0a0a2a,#050515);
    display:block;
}

/* 選單與結束畫面 */
#menu,#gameOver{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#gameOver{
    display:none;
    font-size:28px;
}

/* 勝利畫面 */
#winScreen{
    position:fixed;
    inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.9);
    font-size:40px;
    z-index:99;
}

/* 規則區塊（目前未使用但保留） */
.rule-box{
    margin-top:10px;
    width:480px;
    background:rgba(0,0,0,0.3);
    border-left:3px solid #00f5ff;
    padding:10px;
    font-size:13px;
    color:#ccc;
}
.rule-box h3{color:#00f5ff;}

/* 重新開始按鈕 */
.retry-btn{
    margin-top:20px;
    padding:10px 20px;
    font-size:16px;
    background:#00f5ff;
    color:#000;
    border:none;
    cursor:pointer;
    transition:0.2s;
}
</style>
</head>

<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="480" height="320"></canvas>

    <!-- 主選單 -->
    <div id="menu">
        <h2>START</h2>
        <button onclick="startGame()">PLAY</button>
    </div>

    <!-- 遊戲失敗畫面 -->
    <div id="gameOver">
        <div>💀 GAME OVER</div>
        <button class="retry-btn" onclick="restart()">RETRY</button>
    </div>
</div>

<!-- 勝利畫面 -->
<div id="winScreen">🏆 WIN 🏆</div>

<script>

/* =========================
   DEV CONFIG（開發設定）
========================= */
const CONFIG = {
    FAIL_YOUTUBE_URL: "https://www.youtube.com/watch?v=Aq5WXmQQooo",
    WIN_YOUTUBE_URL: "https://www.youtube.com/watch?v=I1NElpKjm74",
    FAIL_TRIGGER_COUNT: 10
};

/* 取得 canvas 畫布 */
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

/* 球的位置與速度 */
let x,y,dx,dy;

/* 板子 X 座標 */
let paddleX;

/* 磚塊數量設定 */
const TOTAL_BRICKS=15;
const ROWS=3;
const COLS=5;

/* 磚塊陣列 */
let bricks=[];

/* 失敗次數 */
let failCount=0;

/* 遊戲是否進行中 */
let gameRunning=false;

/* 按鍵狀態 */
let right=false,left=false;

/* =========================
   DEV CONSOLE（開發模式）
========================= */
let devInputBox=null;

/* 打開開發指令輸入框 */
function openDevConsole(){
    if(devInputBox) return;

    devInputBox=document.createElement("input");
    devInputBox.placeholder="輸入 pass / fail";

    Object.assign(devInputBox.style,{
        position:"fixed",
        top:"20px",
        left:"50%",
        transform:"translateX(-50%)",
        padding:"10px",
        fontSize:"16px",
        zIndex:"9999",
        border:"2px solid #00f5ff",
        background:"#000",
        color:"#fff"
    });

    document.body.appendChild(devInputBox);
    devInputBox.focus();

    devInputBox.addEventListener("keydown",e=>{
        if(e.key==="Enter"){
            handleDevCommand(devInputBox.value.trim());
            devInputBox.remove();
            devInputBox=null;
        }
    });
}

/* 處理開發指令 */
function handleDevCommand(cmd){
    if(cmd==="pass"){
        winGame();
    }

    if(cmd==="fail"){
        failCount = CONFIG.FAIL_TRIGGER_COUNT;
        window.location.href = CONFIG.FAIL_YOUTUBE_URL;
    }
}

/* =========================
   初始化遊戲
========================= */
function init(){
    x=240;
    y=260;

    /* 板子初始位置 */
    paddleX=200;

    dx=3;
    dy=-3;

    generateLevel();
}

/* =========================
   建立磚塊
========================= */
function generateLevel(){
    bricks=[];
    let count=0;

    for(let c=0;c<COLS;c++){
        bricks[c]=[];
        for(let r=0;r<ROWS;r++){

            if(count<TOTAL_BRICKS){
                bricks[c][r]={
                    status:1,
                    color:`hsl(${count*20},100%,60%)`
                };
            }else{
                bricks[c][r]={status:0};
            }
            count++;
        }
    }
}

/* =========================
   鍵盤控制
========================= */
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowRight") right=true;
    if(e.key==="ArrowLeft") left=true;

    /* Ctrl + Shift + F10 開啟 dev console */
    if(e.ctrlKey && e.shiftKey && e.code==="F10"){
        openDevConsole();
    }
});

document.addEventListener("keyup",e=>{
    if(e.key==="ArrowRight") right=false;
    if(e.key==="ArrowLeft") left=false;
});

/* =========================
   開始 / 重開
========================= */
function startGame(){
    failCount=0;
    init();
    document.getElementById("menu").style.display="none";
    gameRunning=true;
    loop();
}

function restart(){
    document.getElementById("gameOver").style.display="none";
    init();
    gameRunning=true;
    loop();
}

/* =========================
   失敗系統
========================= */
function addFail(){
    failCount++;

    if(failCount >= CONFIG.FAIL_TRIGGER_COUNT){
        window.location.href = CONFIG.FAIL_YOUTUBE_URL;
        return;
    }

    gameRunning=false;
    document.getElementById("gameOver").style.display="flex";
}

/* =========================
   勝利系統
========================= */
function winGame(){
    gameRunning=false;

    document.getElementById("winScreen").style.display="flex";

    setTimeout(()=>{
        window.location.href = CONFIG.WIN_YOUTUBE_URL;
    },1500);
}

/* =========================
   遊戲主迴圈
========================= */
function loop(){

    if(!gameRunning) return;

    ctx.clearRect(0,0,480,320);

    /* 畫板子 */
    ctx.fillStyle="#00f5ff";
    ctx.fillRect(paddleX,300,80,10);

    /* 畫球 */
    ctx.fillStyle="#ff00ff";
    ctx.beginPath();
    ctx.arc(x,y,7,0,Math.PI*2);
    ctx.fill();

    let alive=0;

    /* 畫磚塊 */
    for(let c=0;c<bricks.length;c++){
        for(let r=0;r<bricks[c].length;r++){

            let b=bricks[c][r];

            if(b.status){
                alive++;

                let bx=c*90+20;
                let by=r*40+30;

                ctx.fillStyle=b.color;
                ctx.fillRect(bx,by,70,20);

                /* 碰撞磚塊 */
                if(x>bx && x<bx+70 && y>by && y<by+20){
                    dy=-dy;
                    b.status=0;
                }
            }
        }
    }

    /* 勝利條件 */
    if(alive===0){
        winGame();
        return;
    }

    /* =========================
       🔥 修正重點：板子不能超出畫面
       這是你原本 bug 的原因
    ========================= */

    if(right) paddleX+=8;
    if(left) paddleX-=8;

    // ⭐ 限制板子在 canvas 範圍內（0 ~ 480 - 80）
    if(paddleX < 0) paddleX = 0;
    if(paddleX > 480 - 80) paddleX = 480 - 80;

    /* 球移動 */
    x+=dx;
    y+=dy;

    /* 邊界反彈 */
    if(x<0||x>480) dx=-dx;
    if(y<0) dy=-dy;

    /* 板子碰撞 / 掉落判定 */
    if(y>300){
        if(x>paddleX && x<paddleX+80){
            dy=-dy;
        } else {
            addFail();
            init();
        }
    }

    requestAnimationFrame(loop);
}

</script>

</body>
</html>
